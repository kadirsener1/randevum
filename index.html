<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okul Veli Randevu Sistemi</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh}

        /* LOADER */
        .loader-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
        .loader-overlay.hidden{display:none}
        .spinner{width:50px;height:50px;border:4px solid #e0e0e0;border-top-color:#667eea;border-radius:50%;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loader-text{margin-top:15px;color:#555;font-weight:600}

        /* NAVBAR */
        .navbar{background:rgba(255,255,255,0.97);backdrop-filter:blur(10px);padding:12px 25px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 20px rgba(0,0,0,0.1);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px}
        .logo{display:flex;align-items:center;gap:10px;font-size:1.3em;font-weight:700;color:#4a3f8a}
        .logo span{font-size:1.6em}
        .nav-links{display:flex;gap:4px;flex-wrap:wrap}
        .nav-links button{padding:9px 16px;border:none;background:transparent;color:#555;font-size:0.9em;cursor:pointer;border-radius:8px;transition:all 0.3s;font-weight:600}
        .nav-links button:hover,.nav-links button.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
        .user-info{display:flex;align-items:center;gap:10px}
        .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:1em}
        .user-name{font-weight:600;color:#333;font-size:0.95em}
        .user-role-label{font-size:0.75em;color:#888}
        .logout-btn{padding:7px 14px;border:2px solid #e74c3c;background:transparent;color:#e74c3c;border-radius:8px;cursor:pointer;font-weight:600;transition:all 0.3s;font-size:0.85em}
        .logout-btn:hover{background:#e74c3c;color:#fff}

        /* CONTAINER */
        .container{max-width:1200px;margin:0 auto;padding:25px 20px}

        /* LOGIN / REGISTER */
        .auth-container{display:flex;justify-content:center;align-items:center;min-height:calc(100vh - 70px);padding:20px}
        .auth-box{background:#fff;border-radius:20px;padding:45px 35px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
        .auth-box h2{text-align:center;color:#4a3f8a;margin-bottom:8px;font-size:1.7em}
        .auth-box .subtitle{text-align:center;color:#888;margin-bottom:25px;font-size:0.95em}
        .auth-tabs{display:flex;margin-bottom:25px;border-radius:12px;overflow:hidden;border:2px solid #e0e0e0}
        .auth-tab{flex:1;padding:12px;border:none;background:#fff;font-weight:700;font-size:0.95em;cursor:pointer;transition:all 0.3s;color:#888}
        .auth-tab.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}

        /* FORM */
        .form-group{margin-bottom:18px}
        .form-group label{display:block;margin-bottom:6px;color:#555;font-weight:600;font-size:0.88em}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 15px;border:2px solid #e0e0e0;border-radius:10px;font-size:0.95em;transition:border-color 0.3s;outline:none;font-family:inherit}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#667eea}
        .form-group textarea{resize:vertical;min-height:70px}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px}

        .role-selector{display:flex;gap:8px;margin-bottom:20px}
        .role-btn{flex:1;padding:14px 8px;border:2px solid #e0e0e0;background:#fff;border-radius:12px;cursor:pointer;text-align:center;transition:all 0.3s}
        .role-btn:hover{border-color:#667eea}
        .role-btn.active{border-color:#667eea;background:linear-gradient(135deg,rgba(102,126,234,0.08),rgba(118,75,162,0.08))}
        .role-icon{font-size:1.8em;margin-bottom:4px}
        .role-text{font-weight:600;color:#555;font-size:0.85em}

        /* BUTTONS */
        .btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1.05em;font-weight:600;cursor:pointer;transition:transform 0.3s,box-shadow 0.3s}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,0.4)}
        .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}
        .btn-secondary{padding:9px 20px;background:#fff;color:#667eea;border:2px solid #667eea;border-radius:10px;font-size:0.9em;font-weight:600;cursor:pointer;transition:all 0.3s}
        .btn-secondary:hover{background:#667eea;color:#fff}
        .btn-success{padding:9px 20px;background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff;border:none;border-radius:10px;font-size:0.9em;font-weight:600;cursor:pointer;transition:all 0.3s}
        .btn-success:hover{transform:translateY(-1px);box-shadow:0 5px 15px rgba(46,204,113,0.4)}
        .btn-danger{padding:7px 14px;background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;border-radius:8px;font-size:0.82em;font-weight:600;cursor:pointer;transition:all 0.3s}
        .btn-danger:hover{transform:translateY(-1px)}
        .btn-warning{padding:7px 14px;background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;border:none;border-radius:8px;font-size:0.82em;font-weight:600;cursor:pointer;transition:all 0.3s}
        .btn-sm{padding:6px 12px;font-size:0.8em;border-radius:6px}

        /* STATS */
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:25px}
        .stat-card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 4px 15px rgba(0,0,0,0.06);display:flex;align-items:center;gap:14px;transition:transform 0.3s}
        .stat-card:hover{transform:translateY(-3px)}
        .stat-icon{width:55px;height:55px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.6em}
        .stat-icon.blue{background:linear-gradient(135deg,#667eea,#764ba2)}
        .stat-icon.green{background:linear-gradient(135deg,#2ecc71,#27ae60)}
        .stat-icon.orange{background:linear-gradient(135deg,#f39c12,#e67e22)}
        .stat-icon.red{background:linear-gradient(135deg,#e74c3c,#c0392b)}
        .stat-info h3{font-size:1.6em;color:#333}
        .stat-info p{color:#888;font-size:0.85em}

        /* CARD */
        .card{background:#fff;border-radius:14px;padding:25px;box-shadow:0 4px 15px rgba(0,0,0,0.06);margin-bottom:22px}
        .card h3{color:#4a3f8a;margin-bottom:18px;font-size:1.2em;display:flex;align-items:center;gap:8px}
        .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px}
        .section-header h2{color:#fff;font-size:1.6em;text-shadow:0 2px 10px rgba(0,0,0,0.2)}

        /* CALENDAR */
        .calendar-wrapper{display:grid;grid-template-columns:1fr 1fr;gap:22px}
        .calendar{background:#fff;border-radius:14px;padding:22px;box-shadow:0 4px 15px rgba(0,0,0,0.06)}
        .calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
        .calendar-header h3{color:#4a3f8a;font-size:1.15em}
        .calendar-nav{display:flex;gap:5px}
        .calendar-nav button{width:34px;height:34px;border:2px solid #e0e0e0;background:#fff;border-radius:8px;cursor:pointer;font-size:0.95em;transition:all 0.3s}
        .calendar-nav button:hover{border-color:#667eea;background:#667eea;color:#fff}
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
        .calendar-day-name{text-align:center;font-weight:700;color:#888;font-size:0.8em;padding:7px 0}
        .calendar-day{text-align:center;padding:9px 4px;border-radius:8px;cursor:pointer;transition:all 0.3s;font-weight:500;color:#555;font-size:0.9em}
        .calendar-day:hover:not(.empty):not(.past):not(.weekend){background:rgba(102,126,234,0.1)}
        .calendar-day.today{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:700}
        .calendar-day.selected{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff;font-weight:700}
        .calendar-day.has-apt{position:relative}
        .calendar-day.has-apt::after{content:'';width:5px;height:5px;background:#e74c3c;border-radius:50%;position:absolute;bottom:2px;left:50%;transform:translateX(-50%)}
        .calendar-day.empty{cursor:default}
        .calendar-day.past{color:#ccc;cursor:not-allowed}
        .calendar-day.weekend{color:#ddd;cursor:not-allowed}

        /* TIME SLOTS */
        .time-slots{background:#fff;border-radius:14px;padding:22px;box-shadow:0 4px 15px rgba(0,0,0,0.06)}
        .time-slots h3{color:#4a3f8a;margin-bottom:15px;font-size:1.15em}
        .slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
        .time-slot{padding:11px;border:2px solid #e0e0e0;border-radius:10px;text-align:center;cursor:pointer;transition:all 0.3s;font-weight:600;color:#555;font-size:0.9em}
        .time-slot:hover:not(.taken):not(.blocked){border-color:#667eea;background:rgba(102,126,234,0.05)}
        .time-slot.selected{border-color:#667eea;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
        .time-slot.taken{background:#fff0f0;color:#e74c3c;cursor:not-allowed;border-color:#ffcdd2}
        .time-slot.blocked{background:#f5f5f5;color:#bbb;cursor:not-allowed;border-color:#e0e0e0;text-decoration:line-through}
        .time-slot.teacher-blocked{background:#fff3e0;color:#f39c12;border-color:#ffe0b2;cursor:pointer;text-decoration:none}

        /* APPOINTMENT LIST */
        .appointment-list{list-style:none}
        .appointment-item{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border:2px solid #f0f0f0;border-radius:12px;margin-bottom:10px;transition:all 0.3s;flex-wrap:wrap;gap:10px}
        .appointment-item:hover{border-color:#667eea;box-shadow:0 3px 12px rgba(102,126,234,0.1)}
        .appointment-info{display:flex;align-items:center;gap:14px}
        .apt-date-badge{width:50px;height:50px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
        .apt-date-badge .day{font-size:1.2em;font-weight:700;line-height:1}
        .apt-date-badge .month{font-size:0.65em;text-transform:uppercase}
        .apt-details h4{color:#333;margin-bottom:3px;font-size:0.95em}
        .apt-details p{color:#888;font-size:0.85em}
        .apt-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

        .status-badge{padding:5px 12px;border-radius:20px;font-size:0.75em;font-weight:600}
        .status-badge.pending{background:#fff3e0;color:#f39c12}
        .status-badge.approved{background:#e8f5e9;color:#27ae60}
        .status-badge.rejected{background:#ffebee;color:#e74c3c}
        .status-badge.completed{background:#e3f2fd;color:#2196f3}

        /* TEACHER GRID */
        .teacher-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:15px}
        .teacher-card{border:2px solid #f0f0f0;border-radius:12px;padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.3s}
        .teacher-card:hover,.teacher-card.selected{border-color:#667eea;box-shadow:0 4px 15px rgba(102,126,234,0.12)}
        .teacher-card.selected{background:rgba(102,126,234,0.04)}
        .teacher-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:1.1em;flex-shrink:0}
        .teacher-info h4{color:#333;font-size:0.95em}
        .teacher-info p{color:#888;font-size:0.82em}

        /* STEPS */
        .step-indicator{display:flex;justify-content:center;gap:8px;margin-bottom:25px;flex-wrap:wrap}
        .step{display:flex;align-items:center;gap:6px}
        .step-number{width:30px;height:30px;border-radius:50%;background:#e0e0e0;color:#888;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85em}
        .step.active .step-number{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
        .step.done .step-number{background:#2ecc71;color:#fff}
        .step-text{font-weight:600;color:#888;font-size:0.85em}
        .step.active .step-text{color:#4a3f8a}
        .step-line{width:35px;height:2px;background:#e0e0e0;align-self:center}

        .summary-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
        .summary-row:last-child{border-bottom:none}
        .summary-label{color:#888;font-weight:500;font-size:0.9em}
        .summary-value{color:#333;font-weight:600;font-size:0.9em}

        /* TABS */
        .tabs{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap}
        .tab-btn{padding:8px 16px;border:2px solid #e0e0e0;background:#fff;border-radius:10px;cursor:pointer;font-weight:600;color:#888;transition:all 0.3s;font-size:0.85em}
        .tab-btn.active{border-color:#667eea;color:#667eea;background:rgba(102,126,234,0.04)}

        /* SEARCH */
        .search-box{position:relative;margin-bottom:18px}
        .search-box input{width:100%;padding:12px 18px 12px 42px;border:2px solid #e0e0e0;border-radius:12px;font-size:0.95em;outline:none;transition:border-color 0.3s}
        .search-box input:focus{border-color:#667eea}
        .search-box::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1em}

        .filter-row{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
        .filter-row select,.filter-row input[type="date"]{padding:9px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:0.9em;outline:none;cursor:pointer}

        /* SCHEDULE WEEKLY */
        .weekly-grid{display:grid;grid-template-columns:100px repeat(5,1fr);gap:2px;background:#e0e0e0;border-radius:12px;overflow:hidden;margin-top:15px}
        .weekly-header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:12px 8px;text-align:center;font-weight:700;font-size:0.85em}
        .weekly-time{background:#f8f9fa;padding:10px 8px;text-align:center;font-weight:600;color:#555;font-size:0.8em;display:flex;align-items:center;justify-content:center}
        .weekly-cell{background:#fff;padding:8px;text-align:center;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;min-height:42px}
        .weekly-cell:hover{background:rgba(102,126,234,0.08)}
        .weekly-cell.blocked{background:#ffebee;color:#e74c3c}
        .weekly-cell.available{background:#e8f5e9;color:#27ae60}
        .weekly-cell .cell-icon{font-size:1.1em}

        /* NOTIFICATION */
        .notification{position:fixed;top:75px;right:20px;padding:14px 22px;border-radius:12px;color:#fff;font-weight:600;z-index:300;animation:slideRight 0.3s ease;box-shadow:0 5px 20px rgba(0,0,0,0.2);font-size:0.9em;max-width:350px}
        .notification.success{background:linear-gradient(135deg,#2ecc71,#27ae60)}
        .notification.error{background:linear-gradient(135deg,#e74c3c,#c0392b)}
        .notification.info{background:linear-gradient(135deg,#3498db,#2980b9)}
        @keyframes slideRight{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

        .empty-state{text-align:center;padding:40px 20px;color:#888}
        .empty-state .empty-icon{font-size:3.5em;margin-bottom:12px}
        .empty-state p{font-size:1em}

        .hidden{display:none!important}

        .password-toggle{position:relative}
        .password-toggle button{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1em;padding:5px}

        .info-box{background:linear-gradient(135deg,rgba(102,126,234,0.08),rgba(118,75,162,0.08));border:1px solid rgba(102,126,234,0.2);border-radius:10px;padding:14px 18px;margin-bottom:18px;font-size:0.88em;color:#555;line-height:1.5}
        .info-box strong{color:#4a3f8a}

        @media(max-width:768px){
            .navbar{padding:10px 15px}
            .calendar-wrapper{grid-template-columns:1fr}
            .slots-grid{grid-template-columns:repeat(2,1fr)}
            .stats-grid{grid-template-columns:repeat(2,1fr)}
            .appointment-item{flex-direction:column;align-items:flex-start}
            .filter-row{flex-direction:column}
            .filter-row select,.filter-row input[type="date"]{width:100%}
            .teacher-grid{grid-template-columns:1fr}
            .role-selector{flex-direction:column}
            .form-row{grid-template-columns:1fr}
            .weekly-grid{grid-template-columns:60px repeat(5,1fr);font-size:0.8em}
            .auth-box{padding:30px 20px}
            .step-text{display:none}
        }
    </style>
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Yükleniyor...</div>
</div>

<!-- ===== AUTH PAGE ===== -->
<div id="authPage" class="hidden">
    <nav class="navbar">
        <div class="logo"><span>🏫</span> Veli Randevu Sistemi</div>
    </nav>
    <div class="auth-container">
        <div class="auth-box">
            <h2>🏫 Randevu Sistemi</h2>
            <p class="subtitle">Giriş yapın veya yeni hesap oluşturun</p>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">Giriş Yap</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">Üye Ol</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="loginForm">
                <div class="form-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="loginUsername" placeholder="Kullanıcı adınızı giriniz">
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="loginPassword" placeholder="Şifrenizi giriniz">
                </div>
                <button class="btn-primary" onclick="doLogin()" id="loginBtn">Giriş Yap</button>
            </div>

            <!-- REGISTER FORM -->
            <div id="registerForm" class="hidden">
                <div class="role-selector">
                    <div class="role-btn active" onclick="selectRegRole('veli')" id="regRoleVeli">
                        <div class="role-icon">👨‍👩‍👧</div>
                        <div class="role-text">Veli</div>
                    </div>
                    <div class="role-btn" onclick="selectRegRole('ogretmen')" id="regRoleOgretmen">
                        <div class="role-icon">👩‍🏫</div>
                        <div class="role-text">Öğretmen</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ad Soyad</label>
                        <input type="text" id="regName" placeholder="Ad Soyad">
                    </div>
                    <div class="form-group">
                        <label>Kullanıcı Adı</label>
                        <input type="text" id="regUsername" placeholder="Kullanıcı adı">
                    </div>
                </div>
                <div class="form-group">
                    <label>E-posta</label>
                    <input type="email" id="regEmail" placeholder="E-posta adresiniz">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Şifre</label>
                        <input type="password" id="regPassword" placeholder="Şifre (min 6 karakter)">
                    </div>
                    <div class="form-group">
                        <label>Şifre Tekrar</label>
                        <input type="password" id="regPassword2" placeholder="Şifreyi tekrar giriniz">
                    </div>
                </div>

                <!-- Veli alanları -->
                <div id="veliFields">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Öğrenci Adı Soyadı</label>
                            <input type="text" id="regStudentName" placeholder="Çocuğunuzun adı soyadı">
                        </div>
                        <div class="form-group">
                            <label>Öğrenci Sınıfı</label>
                            <select id="regStudentClass">
                                <option value="">Sınıf Seçin</option>
                                <option>5-A</option><option>5-B</option>
                                <option>6-A</option><option>6-B</option>
                                <option>7-A</option><option>7-B</option>
                                <option>8-A</option><option>8-B</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Telefon</label>
                        <input type="tel" id="regPhone" placeholder="05XX XXX XX XX">
                    </div>
                </div>

                <!-- Öğretmen alanları -->
                <div id="ogretmenFields" class="hidden">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Branş</label>
                            <select id="regBranch">
                                <option value="">Branş Seçin</option>
                                <option>Matematik</option><option>Türkçe</option>
                                <option>Fen Bilimleri</option><option>Sosyal Bilgiler</option>
                                <option>İngilizce</option><option>Beden Eğitimi</option>
                                <option>Müzik</option><option>Görsel Sanatlar</option>
                                <option>Din Kültürü</option><option>Rehberlik</option>
                                <option>Bilişim</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Sınıflar</label>
                            <input type="text" id="regClasses" placeholder="5-A, 6-B, 7-A">
                        </div>
                    </div>
                </div>

<script>
// ===================== CONFIG =====================
const CONFIG = {
    // ---- BURAYI KENDİ REPO BİLGİLERİNİZLE DEĞİŞTİRİN ----
    GITHUB_OWNER: 'kadirsener1',
    GITHUB_REPO: 'randevum',
    GITHUB_TOKEN: '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', // GitHub Personal Access Token
    BRANCH: 'main',
    PATHS: {
        users: 'db/users.json',
        appointments: 'db/appointments.json',
        schedules: 'db/schedules.json'
    }
};

const API_BASE = `https://api.github.com/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/contents/`;

// ===================== GITHUB DB KATMANI =====================
const GitDB = {
    cache: {},
    shas: {},

    async read(fileKey) {
        const path = CONFIG.PATHS[fileKey];
        try {
            const resp = await fetch(API_BASE + path + '?ref=' + CONFIG.BRANCH, {
                headers: {
                    'Authorization': 'token ' + CONFIG.GITHUB_TOKEN,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            if (!resp.ok) throw new Error('Dosya okunamadı: ' + path);
            const data = await resp.json();
            this.shas[fileKey] = data.sha;
            const content = JSON.parse(atob(data.content));
            this.cache[fileKey] = content;
            return content;
        } catch (e) {
            console.error('GitDB read error:', e);
            // Dosya yoksa varsayılan döndür
            const defaults = {
                users: { users: [], nextId: 1 },
                appointments: { appointments: [], nextId: 1 },
                schedules: { weeklyBlocks: [], specificBlocks: [] }
            };
            return defaults[fileKey] || {};
        }
    },

    async write(fileKey, data) {
        const path = CONFIG.PATHS[fileKey];
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));

        // SHA'yı al (güncel)
        try {
            const getResp = await fetch(API_BASE + path + '?ref=' + CONFIG.BRANCH, {
                headers: {
                    'Authorization': 'token ' + CONFIG.GITHUB_TOKEN,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            if (getResp.ok) {
                const getData = await getResp.json();
                this.shas[fileKey] = getData.sha;
            }
        } catch (e) {}

        const body = {
            message: `Update ${path} - ${new Date().toLocaleString('tr-TR')}`,
            content: content,
            branch: CONFIG.BRANCH
        };

        if (this.shas[fileKey]) {
            body.sha = this.shas[fileKey];
        }

        const resp = await fetch(API_BASE + path, {
            method: 'PUT',
            headers: {
                'Authorization': 'token ' + CONFIG.GITHUB_TOKEN,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        });

        if (!resp.ok) {
            const errData = await resp.json();
            throw new Error(errData.message || 'Yazma hatası');
        }

        const result = await resp.json();
        this.shas[fileKey] = result.content.sha;
        this.cache[fileKey] = data;
        return data;
    },

    getCached(fileKey) {
        return this.cache[fileKey];
    }
};

// ===================== UYGULAMA STATE =====================
let currentUser = null;
let currentPage = 'dashboard';
let selectedDate = null;
let selectedTime = null;
let selectedTeacher = null;
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();
let regRole = 'veli';

// ===================== YARDIMCI FONKSİYONLAR =====================
function getToday() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
const MONTHS = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const MONTHS_S = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
const DAYS = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
const DAYS_FULL = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const TIME_SLOTS = ['08:30','09:00','09:30','10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30'];

function showLoader(show=true) {
    document.getElementById('loader').classList.toggle('hidden', !show);
}

function notify(msg, type='info') {
    document.querySelectorAll('.notification').forEach(n=>n.remove());

    el.className = 'notification ' + type;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3500);
}

function getDayOfWeek(dateStr) {
    return new Date(dateStr).getDay(); // 0=pazar ... 6=cumartesi
}

// ===================== AUTH =====================
function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));

        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');

    }
}

}

async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if(!username || !password) { notify('Kullanıcı adı ve şifre giriniz','error'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Giriş yapılıyor...';

    try {
        const data = await GitDB.read('users');
        const user = data.users.find(u => u.username === username && u.password === password);
        if(!user) { notify('Kullanıcı adı veya şifre hatalı!','error'); btn.disabled=false; btn.textContent='Giriş Yap'; return; }

        currentUser = user;
        localStorage.setItem('currentUser', JSON.stringify(user));
        enterApp();
        notify('Hoş geldiniz, ' + user.name + '!', 'success');
    } catch(e) {
        notify('Bağlantı hatası: ' + e.message, 'error');
    }
    btn.disabled = false; btn.textContent = 'Giriş Yap';
}

async function doRegister() {
    const name = document.getElementById('regName').value.trim();
    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    const pass2 = document.getElementById('regPassword2').value;

    if(!name || !username || !email || !pass) { notify('Tüm alanları doldurunuz','error'); return; }
    if(pass.length < 6) { notify('Şifre en az 6 karakter olmalı','error'); return; }
    if(pass !== pass2) { notify('Şifreler eşleşmiyor','error'); return; }

    const btn = document.getElementById('regBtn');
    btn.disabled = true; btn.textContent = 'Kayıt yapılıyor...';

    try {
        const data = await GitDB.read('users');

        if(data.users.find(u => u.username === username)) {
            notify('Bu kullanıcı adı zaten alınmış','error');
            btn.disabled=false; btn.textContent='Üye Ol'; return;
        }

        const newUser = {
            id: data.nextId,
            username, password: pass, role: regRole,
            name, email
        };

        if(regRole === 'veli') {
            const sName = document.getElementById('regStudentName').value.trim();
            const sClass = document.getElementById('regStudentClass').value;
            const phone = document.getElementById('regPhone').value.trim();
            if(!sName || !sClass) { notify('Öğrenci bilgilerini doldurunuz','error'); btn.disabled=false; btn.textContent='Üye Ol'; return; }
            newUser.studentName = sName;
            newUser.studentClass = sClass;
            newUser.phone = phone;
        } else {
            const branch = document.getElementById('regBranch').value;
            const classes = document.getElementById('regClasses').value.trim();
            if(!branch) { notify('Branş seçiniz','error'); btn.disabled=false; btn.textContent='Üye Ol'; return; }
            newUser.branch = branch;
            newUser.classes = classes;
        }

        data.users.push(newUser);
        data.nextId++;
        await GitDB.write('users', data);

        notify('Kayıt başarılı! Giriş yapabilirsiniz.', 'success');
        switchAuthTab('login');
        document.getElementById('loginUsername').value = username;
    } catch(e) {
        notify('Kayıt hatası: ' + e.message, 'error');
    }
    btn.disabled=false; btn.textContent='Üye Ol';
}

        el.className='step';
        if(i<active) el.classList.add('done');

function filterT(q) {

    `;
    drawCalendar();

function drawCalendar() {
    const box = document.getElementById('calBox');
    const first = new Date(calYear, calMonth, 1);
    const last = new Date(calYear, calMonth+1, 0);
    let startDay = first.getDay()-1; if(startDay<0) startDay=6;
    const today = new Date(); today.setHours(0,0,0,0);

    const apts = GitDB.getCached('appointments')?.appointments||[];
    const aptDates = apts.filter(a=>a.teacherId===selectedTeacher.id&&a.status!=='rejected').map(a=>a.date);

    let html = DAYS.map(d=>`<div class="calendar-day-name">${d}</div>`).join('');
    for(let i=0;i<startDay;i++) html+=`<div class="calendar-day empty"></div>`;
    for(let d=1;d<=last.getDate();d++) {
        const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dt = new Date(calYear,calMonth,d);
        const isToday = dt.getTime()===today.getTime();
        const isPast = dt<today;
        const isWE = dt.getDay()===0||dt.getDay()===6;
        const isSel = selectedDate===ds;
        const hasA = aptDates.includes(ds);

        let cls='calendar-day';
        if(isToday) cls+=' today';
        if(isSel) cls+=' selected';
        if(isPast) cls+=' past';
        if(isWE) cls+=' weekend';
        if(hasA) cls+=' has-apt';

        if(isPast||isWE) html+=`<div class="${cls}">${d}</div>`;
        else html+=`<div class="${cls}" onclick="pickDate('${ds}')">${d}</div>`;
    }

    box.innerHTML = `
        <div class="calendar-header">
            <h3>${MONTHS[calMonth]} ${calYear}</h3>
            <div class="calendar-nav">
                <button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}drawCalendar()">◀</button>
                <button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}drawCalendar()">▶</button>
            </div>
        </div>
        <div class="calendar-grid">${html}</div>
    `;
}

function pickDate(ds) {
    selectedDate=ds; selectedTime=null;
    drawCalendar();
    drawSlots();
}

function drawSlots() {
    const box = document.getElementById('slotsBox');
    const apts = GitDB.getCached('appointments')?.appointments||[];
    const schData = GitDB.getCached('schedules')||{weeklyBlocks:[],specificBlocks:[]};

    const takenTimes = apts.filter(a=>a.teacherId===selectedTeacher.id&&a.date===selectedDate&&a.status!=='rejected').map(a=>a.time);

    // Haftalık blokları kontrol et
    const dayOfWeek = getDayOfWeek(selectedDate); // 0=pazar
    const weeklyBlocked = schData.weeklyBlocks
        .filter(b=>b.teacherId===selectedTeacher.id&&b.dayOfWeek===dayOfWeek)
        .map(b=>b.time);

    // Özel tarih blokları
    const specificBlocked = schData.specificBlocks
        .filter(b=>b.teacherId===selectedTeacher.id&&b.date===selectedDate)
        .map(b=>b.time);

    const allBlocked = [...new Set([...weeklyBlocked, ...specificBlocked])];

    const dt = new Date(selectedDate);

    box.innerHTML = `
        <h3>🕐 ${dt.getDate()} ${MONTHS[dt.getMonth()]} ${DAYS_FULL[dt.getDay()]}</h3>
        <p style="color:#888;margin-bottom:12px;font-size:0.85em;">
            <span style="display:inline-block;width:10px;height:10px;background:#e8f5e9;border:1px solid #27ae60;border-radius:3px;margin-right:3px;"></span> Müsait
            <span style="display:inline-block;width:10px;height:10px;background:#fff0f0;border:1px solid #e74c3c;border-radius:3px;margin:0 3px 0 10px;"></span> Dolu
            <span style="display:inline-block;width:10px;height:10px;background:#f5f5f5;border:1px solid #ccc;border-radius:3px;margin:0 3px 0 10px;"></span> Kapalı
        </p>
        <div class="slots-grid">
            ${TIME_SLOTS.map(slot=>{
                const isTaken = takenTimes.includes(slot);
                const isBlocked = allBlocked.includes(slot);
                const isSel = selectedTime===slot;
                let cls='time-slot';
                if(isTaken) cls+=' taken';
                else if(isBlocked) cls+=' blocked';
                else if(isSel) cls+=' selected';
                const clickable = !isTaken&&!isBlocked;
                return `<div class="${cls}" ${clickable?`onclick="pickTime('${slot}')"`:''}>${slot}${isTaken?' (Dolu)':''}${isBlocked?' (Kapalı)':''}</div>`;
            }).join('')}
        </div>
    `;
}

function pickTime(t) {
    selectedTime=t;
    drawSlots();
    setTimeout(()=>showStep3(), 200);
}

function showStep3() {
    updateSteps(3);
    const dt=new Date(selectedDate);
    document.getElementById('stepContent').innerHTML = `
        <div style="margin-bottom:12px;"><button class="btn-secondary" onclick="showStep2()" style="width:auto;">← Geri</button></div>
        <h3>✅ Randevu Özeti</h3>
        <div style="background:#f8f9fa;border-radius:12px;padding:22px;margin:18px 0;">
            <div class="summary-row"><span class="summary-label">Öğretmen</span><span class="summary-value">${selectedTeacher.name}</span></div>
            <div class="summary-row"><span class="summary-label">Branş</span><span class="summary-value">${selectedTeacher.branch||'-'}</span></div>
            <div class="summary-row"><span class="summary-label">Tarih</span><span class="summary-value">${dt.getDate()} ${MONTHS[dt.getMonth()]} ${dt.getFullYear()}, ${DAYS_FULL[dt.getDay()]}</span></div>
            <div class="summary-row"><span class="summary-label">Saat</span><span class="summary-value">${selectedTime}</span></div>
            <div class="summary-row"><span class="summary-label">Öğrenci</span><span class="summary-value">${currentUser.studentName||'-'} (${currentUser.studentClass||'-'})</span></div>
        </div>
        <div class="form-group">
            <label>Görüşme Konusu *</label>
            <select id="aptSubject">
                <option value="">Konu Seçiniz</option>
                <option>Ders Başarısı</option><option>Davranış</option><option>Devamsızlık</option>
                <option>Sosyal Gelişim</option><option>Rehberlik</option><option>Diğer</option>
            </select>
        </div>
        <div class="form-group">
            <label>Not (İsteğe Bağlı)</label>
            <textarea id="aptNote" placeholder="Eklemek istediğiniz not..."></textarea>
        </div>
        <button class="btn-primary" onclick="submitAppointment()" id="submitAptBtn">✅ Randevuyu Onayla</button>
    `;
}

async function submitAppointment() {
    const subject = document.getElementById('aptSubject').value;
    if(!subject) {notify('Konu seçiniz','error');return;}
    const note = document.getElementById('aptNote').value.trim();
    const btn = document.getElementById('submitAptBtn');
    btn.disabled=true; btn.textContent='Kaydediliyor...';

    try {
        const data = await GitDB.read('appointments');
        data.appointments.push({
            id: data.nextId,
            teacherId: selectedTeacher.id,
            teacherName: selectedTeacher.name,
            teacherBranch: selectedTeacher.branch||'',
            parentId: currentUser.id,
            parentName: currentUser.name,
            studentName: currentUser.studentName||'',
            studentClass: currentUser.studentClass||'',
            phone: currentUser.phone||'',
            date: selectedDate,
            time: selectedTime,
            subject, note,
            status: 'pending',
            createdAt: new Date().toISOString()
        });
        data.nextId++;
        await GitDB.write('appointments', data);
        notify('Randevu talebiniz oluşturuldu! ✅','success');
        navigateTo('myAppointments');
    } catch(e) {
        notify('Hata: '+e.message,'error');
        btn.disabled=false; btn.textContent='✅ Randevuyu Onayla';
    }
}

// ===================== VELİ RANDEVULARIM =====================
function renderMyAppointments(c) {
    const apts = (GitDB.getCached('appointments')?.appointments||[]).filter(a=>a.parentId===currentUser.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    c.innerHTML = `
        <div class="section-header">
            <h2>📋 Randevularım</h2>
            <button class="btn-success" onclick="navigateTo('newAppointment')">➕ Yeni Randevu</button>
        </div>
        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="filterMyApts('all',this)">Tümü (${apts.length})</button>
                <button class="tab-btn" onclick="filterMyApts('pending',this)">Bekleyen (${apts.filter(a=>a.status==='pending').length})</button>
                <button class="tab-btn" onclick="filterMyApts('approved',this)">Onaylı (${apts.filter(a=>a.status==='approved').length})</button>
                <button class="tab-btn" onclick="filterMyApts('rejected',this)">Reddedilen (${apts.filter(a=>a.status==='rejected').length})</button>
            </div>
            ${apts.length ? '<ul class="appointment-list" id="myAptList">'+apts.map(a=>renderAptItem(a,true)).join('')+'</ul>' :
            '<div class="empty-state"><div class="empty-icon">📭</div><p>Henüz randevunuz yok</p><button class="btn-primary" style="width:auto;margin-top:12px;" onclick="navigateTo(\'newAppointment\')">İlk Randevunuzu Oluşturun</button></div>'}
        </div>
    `;
}

function filterMyApts(status, btn) {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    let apts = (GitDB.getCached('appointments')?.appointments||[]).filter(a=>a.parentId===currentUser.id);
    if(status!=='all') apts=apts.filter(a=>a.status===status);
    apts.sort((a,b)=>new Date(b.date)-new Date(a.date));
    const el=document.getElementById('myAptList');
    if(el) el.innerHTML = apts.length ? apts.map(a=>renderAptItem(a,true)).join('') : '<div class="empty-state"><div class="empty-icon">📭</div><p>Bu kategoride randevu yok</p></div>';
}

// ===================== ÖĞRETMEN GELEN RANDEVULAR =====================
function renderIncomingApts(c) {
    const apts = (GitDB.getCached('appointments')?.appointments||[]).filter(a=>a.teacherId===currentUser.id).sort((a,b)=>new Date(b.createdAt||b.date)-new Date(a.createdAt||a.date));
    c.innerHTML = `
        <div class="section-header"><h2>📥 Gelen Randevu Talepleri</h2></div>
        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="filterIncApts('all',this)">Tümü (${apts.length})</button>
                <button class="tab-btn" onclick="filterIncApts('pending',this)">Bekleyen (${apts.filter(a=>a.status==='pending').length})</button>
                <button class="tab-btn" onclick="filterIncApts('approved',this)">Onaylı (${apts.filter(a=>a.status==='approved').length})</button>
            </div>
            ${apts.length ? '<ul class="appointment-list" id="incAptList">'+apts.map(a=>renderTeacherAptItem(a)).join('')+'</ul>' :
            '<div class="empty-state"><div class="empty-icon">📭</div><p>Henüz randevu talebi yok</p></div>'}
        </div>
    `;
}

function filterIncApts(status, btn) {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    let apts = (GitDB.getCached('appointments')?.appointments||[]).filter(a=>a.teacherId===currentUser.id);
    if(status!=='all') apts=apts.filter(a=>a.status===status);
    const el=document.getElementById('incAptList');
    if(el) el.innerHTML = apts.length ? apts.map(a=>renderTeacherAptItem(a)).join('') : '<div class="empty-state"><div class="empty-icon">📭</div><p>Bu kategoride randevu yok</p></div>';
}

async function changeAptStatus(id, status) {
    showLoader();
    try {
        const data = await GitDB.read('appointments');
        const idx = data.appointments.findIndex(a=>a.id===id);
        if(idx!==-1) {
            data.appointments[idx].status = status;
            data.appointments[idx].updatedAt = new Date().toISOString();
            await GitDB.write('appointments', data);
            const t={approved:'onaylandı ✅',rejected:'reddedildi ❌',completed:'tamamlandı ✔'};
            notify('Randevu '+t[status], status==='rejected'?'error':'success');
        }
        navigateTo(currentPage);
    } catch(e) {
        notify('Hata: '+e.message,'error');
        showLoader(false);
    }
}

async function cancelApt(id) {
    if(!confirm('Bu randevuyu iptal etmek istediğinize emin misiniz?')) return;
    showLoader();
    try {
        const data = await GitDB.read('appointments');
        data.appointments = data.appointments.filter(a=>a.id!==id);
        await GitDB.write('appointments', data);
        notify('Randevu iptal edildi','info');
        navigateTo('myAppointments');
    } catch(e) {
        notify('Hata: '+e.message,'error');
        showLoader(false);
    }
}

// ===================== ÖĞRETMEN MÜSAİTLİK YÖNETİMİ =====================
function renderSchedule(c) {
    const schData = GitDB.getCached('schedules')||{weeklyBlocks:[],specificBlocks:[]};
    const myBlocks = schData.weeklyBlocks.filter(b=>b.teacherId===currentUser.id);

    // Günlere göre grupla
    const dayLabels = ['','Pazartesi','Salı','Çarşamba','Perşembe','Cuma'];

    c.innerHTML = `
        <div class="section-header"><h2>📅 Haftalık Müsaitlik Yönetimi</h2></div>
        <div class="card">
            <div class="info-box">
                <strong>ℹ️ Nasıl çalışır?</strong><br>
                Aşağıdaki tablodan kapatmak istediğiniz gün ve saatlere tıklayın.
                <span style="color:#e74c3c;">🔴 Kırmızı</span> = Kapalı, <span style="color:#27ae60;">🟢 Yeşil</span> = Açık.<br>
                Bu ayarlar <strong>her hafta otomatik</strong> uygulanır. Bir kere ayarlayın, her hafta geçerli olsun!
            </div>
            <div class="weekly-grid">
                <div class="weekly-header">Saat</div>
                ${[1,2,3,4,5].map(d=>`<div class="weekly-header">${dayLabels[d]}</div>`).join('')}
                ${TIME_SLOTS.map(time=>`
                    <div class="weekly-time">${time}</div>
                    ${[1,2,3,4,5].map(day=>{
                        const isBlocked = myBlocks.some(b=>b.dayOfWeek===day&&b.time===time);
                        return `<div class="weekly-cell ${isBlocked?'blocked':'available'}" onclick="toggleWeeklyBlock(${day},'${time}')" title="${dayLabels[day]} ${time}">
                            <span class="cell-icon">${isBlocked?'🔴':'🟢'}</span>
                        </div>`;
                    }).join('')}
                `).join('')}
            </div>
        </div>
    `;
}

async function toggleWeeklyBlock(dayOfWeek, time) {
    showLoader();
    try {
        const data = await GitDB.read('schedules');
        const idx = data.weeklyBlocks.findIndex(b=>b.teacherId===currentUser.id&&b.dayOfWeek===dayOfWeek&&b.time===time);

        if(idx!==-1) {
            // Kaldır
            data.weeklyBlocks.splice(idx, 1);
        } else {
            // Ekle
            data.weeklyBlocks.push({
                teacherId: currentUser.id,
                dayOfWeek: dayOfWeek,
                time: time
            });
        }

        await GitDB.write('schedules', data);
        navigateTo('schedule');
    } catch(e) {
        notify('Hata: '+e.message,'error');
        showLoader(false);
    }
}

// ===================== YÖNETİCİ - TÜM RANDEVULAR =====================
function renderAllApts(c) {
    const apts = (GitDB.getCached('appointments')?.appointments||[]).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const users = GitDB.getCached('users')?.users||[];
    const teachers = users.filter(u=>u.role==='ogretmen');

    c.innerHTML = `
        <div class="section-header"><h2>📋 Tüm Randevular</h2></div>
        <div class="card">
            <div class="filter-row">
                <select onchange="filterAllApts()" id="fTeacher"><option value="">Tüm Öğretmenler</option>${teachers.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select>
                <select onchange="filterAllApts()" id="fStatus"><option value="">Tüm Durumlar</option><option value="pending">Beklemede</option><option value="approved">Onaylı</option><option value="rejected">Reddedilmiş</option><option value="completed">Tamamlanmış</option></select>
                <input type="date" onchange="filterAllApts()" id="fDate">
            </div>
            <div class="search-box"><input type="text" placeholder="Veli veya öğrenci ara..." oninput="filterAllApts()" id="fSearch"></div>
            <ul class="appointment-list" id="allAptList">
                ${apts.length ? apts.map(a=>renderTeacherAptItem(a,true)).join('') : '<div class="empty-state"><div class="empty-icon">📭</div><p>Randevu yok</p></div>'}
            </ul>
        </div>
    `;
}

function filterAllApts() {
    const tf = document.getElementById('fTeacher').value;
    const sf = document.getElementById('fStatus').value;
    const df = document.getElementById('fDate').value;
    const sq = (document.getElementById('fSearch').value||'').toLowerCase();
    let apts = GitDB.getCached('appointments')?.appointments||[];
    if(tf) apts=apts.filter(a=>a.teacherId==tf);
    if(sf) apts=apts.filter(a=>a.status===sf);
    if(df) apts=apts.filter(a=>a.date===df);
    if(sq) apts=apts.filter(a=>(a.parentName||'').toLowerCase().includes(sq)||(a.studentName||'').toLowerCase().includes(sq));
    apts.sort((a,b)=>new Date(b.date)-new Date(a.date));
    document.getElementById('allAptList').innerHTML = apts.length ? apts.map(a=>renderTeacherAptItem(a,true)).join('') : '<div class="empty-state"><div class="empty-icon">🔍</div><p>Sonuç bulunamadı</p></div>';
}

// ===================== YÖNETİCİ - ÖĞRETMENLER =====================

                            <p style="font-size:0.78em;color:#999;">Sınıflar: ${t.classes||'-'}</p>

// ===================== YÖNETİCİ - RAPORLAR =====================
function renderReports(c) {
    const apts = GitDB.getCached('appointments')?.appointments||[];
    const users = GitDB.getCached('users')?.users||[];
    const teachers = users.filter(u=>u.role==='ogretmen');
    const total=apts.length, pending=apts.filter(a=>a.status==='pending').length, approved=apts.filter(a=>a.status==='approved').length, rejected=apts.filter(a=>a.status==='rejected').length, completed=apts.filter(a=>a.status==='completed').length;

    const subjects={};
    apts.forEach(a=>{subjects[a.subject]=(subjects[a.subject]||0)+1;});

    const tStats = teachers.map(t=>({...t, count:apts.filter(a=>a.teacherId===t.id).length})).sort((a,b)=>b.count-a.count);
    const maxCount = tStats[0]?.count||1;

    c.innerHTML = `
        <div class="section-header"><h2>📈 Raporlar & İstatistikler</h2></div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon blue">📋</div><div class="stat-info"><h3>${total}</h3><p>Toplam</p></div></div>
            <div class="stat-card"><div class="stat-icon orange">⏳</div><div class="stat-info"><h3>${pending}</h3><p>Bekleyen</p></div></div>
            <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><h3>${approved+completed}</h3><p>Onaylanan</p></div></div>
            <div class="stat-card"><div class="stat-icon red">❌</div><div class="stat-info"><h3>${rejected}</h3><p>Reddedilen</p></div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:22px;">
            <div class="card">
                <h3>📌 Konu Dağılımı</h3>
                ${Object.entries(subjects).length ? Object.entries(subjects).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;">
                        <span style="font-weight:600;color:#555;font-size:0.9em;">${k}</span>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <div style="width:${Math.max(v/total*180,15)}px;height:7px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:4px;"></div>
                            <span style="font-weight:700;color:#4a3f8a;font-size:0.9em;">${v}</span>
                        </div>
                    </div>
                `).join('') : '<p style="color:#888;">Veri yok</p>'}
            </div>
            <div class="card">
                <h3>👩‍🏫 Öğretmen Bazlı</h3>
                ${tStats.map(t=>`
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;">
                        <span style="font-weight:600;color:#555;font-size:0.9em;">${t.name}</span>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <div style="width:${Math.max(t.count/maxCount*140,8)}px;height:7px;background:linear-gradient(135deg,#2ecc71,#27ae60);border-radius:4px;"></div>
                            <span style="font-weight:700;color:#27ae60;font-size:0.9em;">${t.count}</span>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>
    `;
}

// ===================== RENDER HELPERS =====================
function renderAptItem(a, showCancel=false) {
    const dt=new Date(a.date);
    return `<li class="appointment-item">
        <div class="appointment-info">
            <div class="apt-date-badge"><div class="day">${dt.getDate()}</div><div class="month">${MONTHS_S[dt.getMonth()]}</div></div>
            <div class="apt-details">
                <h4>${a.teacherName} - ${a.teacherBranch||''}</h4>
                <p>🕐 ${a.time} | 📌 ${a.subject||'-'}</p>
                ${a.note?`<p style="font-size:0.8em;color:#999;">📝 ${a.note}</p>`:''}
            </div>
        </div>
        <div class="apt-actions">
            <span class="status-badge ${a.status}">${STATUS_TEXT[a.status]||a.status}</span>
            ${showCancel&&a.status==='pending'?`<button class="btn-danger" onclick="cancelApt(${a.id})">İptal</button>`:''}
        </div>
    </li>`;
}

function renderTeacherAptItem(a, isAdmin=false) {
    const dt=new Date(a.date);
    return `<li class="appointment-item">
        <div class="appointment-info">
            <div class="apt-date-badge"><div class="day">${dt.getDate()}</div><div class="month">${MONTHS_S[dt.getMonth()]}</div></div>
            <div class="apt-details">
                <h4>${a.parentName} → ${a.studentName} (${a.studentClass||'-'})</h4>
                <p>🕐 ${a.time} | 📌 ${a.subject||'-'}${isAdmin?' | 👩‍🏫 '+a.teacherName:''}</p>
                ${a.note?`<p style="font-size:0.8em;color:#999;">📝 ${a.note}</p>`:''}
                ${a.phone?`<p style="font-size:0.8em;color:#999;">📞 ${a.phone}</p>`:''}
            </div>
        </div>
        <div class="apt-actions">
            <span class="status-badge ${a.status}">${STATUS_TEXT[a.status]||a.status}</span>
            ${a.status==='pending'?`
                <button class="btn-success btn-sm" onclick="changeAptStatus(${a.id},'approved')">✅ Onayla</button>
                <button class="btn-danger btn-sm" onclick="changeAptStatus(${a.id},'rejected')">❌ Reddet</button>
            `:''}
            ${a.status==='approved'?`<button class="btn-warning btn-sm" onclick="changeAptStatus(${a.id},'completed')">✔ Tamamla</button>`:''}
        </div>
    </li>`;
}

// ===================== BAŞLANGIÇ =====================
async function init() {
    showLoader();
    try {
        await GitDB.read('users');
        await GitDB.read('appointments');
        await GitDB.read('schedules');

        // Oturum kontrolü
        const saved = localStorage.getItem('currentUser');
        if(saved) {
            const u = JSON.parse(saved);
            const users = GitDB.getCached('users')?.users||[];
            const fresh = users.find(x=>x.id===u.id&&x.username===u.username);
            if(fresh) {
                currentUser = fresh;
                enterApp();
                showLoader(false);
                return;
            }
        }

        document.getElementById('authPage').classList.remove('hidden');
    } catch(e) {
        document.getElementById('authPage').classList.remove('hidden');
        notify('Sunucu bağlantısı kurulamadı. Ayarları kontrol edin.','error');
        console.error('Init error:', e);
    }
    showLoader(false);
}

init();
</script>
